name: Release and Publish to NPM

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    # Only run if CI workflow succeeded and this is not a version bump commit
    if: "github.event.workflow_run.conclusion == 'success' && !contains(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Link package
        run: npm link

      - name: Run tests
        run: npm test

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump type
        id: version-type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          echo "Commits since last tag:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?:" || echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            echo "version_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^(fix|bug)(\(.+\))?:" || echo "$COMMITS" | grep -qE "^(perf|refactor|style|docs|test|chore)(\(.+\))?:"; then
            echo "version_type=patch" >> $GITHUB_OUTPUT
          else
            echo "version_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT_VERSION="v$(node -p "require('./package.json').version")"
          VERSION_TYPE="${{ steps.version-type.outputs.version_type }}"

          # Check if current version is already published (retry scenario)
          if npm view "ya-repo-toc@${CURRENT_VERSION#v}" version >/dev/null 2>&1; then
            # Already published — need a fresh bump
            NEW_VERSION=$(npm version $VERSION_TYPE --no-git-tag-version)
          elif git tag -l "$CURRENT_VERSION" | grep -q .; then
            # Tagged but not published — use the existing version
            NEW_VERSION="$CURRENT_VERSION"
          else
            # Normal case — bump
            NEW_VERSION=$(npm version $VERSION_TYPE --no-git-tag-version)
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $NEW_VERSION"

      - name: Update package-lock.json
        run: npm install --package-lock-only

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No changes to commit (version already bumped)"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          fi

      - name: Tag release
        run: |
          if git rev-parse "${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.new_version }} already exists"
          else
            git tag "${{ steps.version.outputs.new_version }}"
          fi

      - name: Push changes
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.new_version }}"

      - name: Publish to NPM
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          if npm view "ya-repo-toc@${VERSION#v}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.new_version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --title "Release $TAG" --notes "Auto-generated release from commits pushed to main branch."
          fi
